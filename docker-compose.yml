services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: grabngo-backend
    ports:
      - "4000:4000"
    env_file:
      - .env.docker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grabngo-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend